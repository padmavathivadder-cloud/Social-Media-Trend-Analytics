 
<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialTrend Pro | Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page {
            display: none;
        }
       
        .page.active {
            display: block;
        }
       
        .platform-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: bold;
        }
       
        .insta {
            background: #E1306C;
            color: white;
        }
       
        .fb {
            background: #4267B2;
            color: white;
        }
       
        .yt {
            background: #FF0000;
            color: white;
        }
       
        .snap {
            background: #FFFC00;
            color: black;
        }
       
        .shree {
            background: #f27022;
            color: white;
        }
    </style>
</head>
 
<body class="bg-slate-50 text-slate-900">
 
    <nav class="bg-sky-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center p-4">
            <h1 class="text-xl font-black italic">SOCIAL-TREND</h1>
            <div class="flex gap-4 text-sm font-bold">
                <button onclick="showPage('home')" class="hover:underline">Analytics</button>
                <button onclick="showPage('add')" class="hover:underline">Add Post</button>
                <button onclick="showPage('filter')" class="hover:underline">Date Search</button>
                <button onclick="showPage('data')" class="hover:underline">Full Log</button>
            </div>
        </div>
    </nav>
 
    <main class="container mx-auto p-4 mt-4">
 
        <section id="home" class="page active">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 text-sky-700">Trending Hashtags</h2>
                    <ul id="trendList" class="space-y-2">
                        <li class="text-gray-400 italic">No trends analyzed yet...</li>
                    </ul>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                    <h2 class="text-lg font-bold mb-2">Total Engagement</h2>
                    <div class="text-5xl font-black text-sky-600" id="totalPosts">0</div>
                    <p class="text-gray-500 uppercase text-xs mt-2 font-bold tracking-widest">Global Posts Tracked</p>
                </div>
            </div>
        </section>
 
        <section id="add" class="page">
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
                <h2 class="text-2xl font-bold mb-6">Create Trend Entry</h2>
                <form id="trendForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Social Media Platform</label>
                        <select id="platform" class="w-full p-3 border rounded-lg bg-gray-50">
                            <option value="Instagram">Instagram</option>
                            <option value="Facebook">Facebook</option>
                            <option value="YouTube">YouTube</option>
                            <option value="Snapchat">Snapchat</option>
                            <option value="ShareChat">ShareChat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Post Content (Include #hashtags)</label>
                        <textarea id="postInput" placeholder="Write post text here..." class="w-full p-3 border rounded-lg h-24"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">Media Type</label>
                            <select id="mediaType" class="w-full p-3 border rounded-lg">
                                <option value="Song">🎵 Song</option>
                                <option value="Video">🎥 Video</option>
                                <option value="Movie">🎬 Movie</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">Duration/Time</label>
                            <input type="text" id="mediaTime" placeholder="e.g. 03:45" class="w-full p-3 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">Post Date</label>
                            <input type="date" id="postDate" required class="w-full p-3 border rounded-lg">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-sky-600 text-white py-4 rounded-xl font-bold hover:bg-sky-700 transition">Analyze & Save</button>
                </form>
            </div>
        </section>
 
        <section id="filter" class="page">
            <div class="max-w-3xl mx-auto">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6">
                    <h2 class="text-xl font-bold mb-4">Filter Trends by Date</h2>
                    <div class="flex gap-4">
                        <input type="date" id="searchDate" class="flex-1 p-3 border rounded-lg">
                        <button onclick="filterByDate()" class="bg-slate-800 text-white px-8 rounded-lg font-bold">Search</button>
                    </div>
                </div>
                <div id="filterResults" class="space-y-4"></div>
            </div>
        </section>
 
        <section id="data" class="page">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                    <h2 class="text-xl font-bold">Trend Master Log</h2>
                    <button onclick="clearData()" class="text-red-500 text-xs font-bold uppercase hover:underline">Clear Database</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-bold">
                                <th class="p-4 border-b">Platform</th>
                                <th class="p-4 border-b">Media Info</th>
                                <th class="p-4 border-b">Timing</th>
                                <th class="p-4 border-b">Date</th>
                                <th class="p-4 border-b">Post Snippet</th>
                            </tr>
                        </thead>
                        <tbody id="fullLogBody" class="text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
 
    </main>
 
    <script>
        // --- DATA STATE ---
        let trendData = JSON.parse(localStorage.getItem('socialTrends')) || [];
 
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            updateUI();
        }
 
        // --- ADD POST LOGIC ---
        document.getElementById('trendForm').onsubmit = (e) => {
            e.preventDefault();
 
            const newPost = {
                id: Date.now(),
                platform: document.getElementById('platform').value,
                text: document.getElementById('postInput').value,
                mediaType: document.getElementById('mediaType').value,
                mediaTime: document.getElementById('mediaTime').value,
                date: document.getElementById('postDate').value
            };
 
            trendData.push(newPost);
            localStorage.setItem('socialTrends', JSON.stringify(trendData));
 
            alert("Trend Added Successfully!");
            e.target.reset();
            showPage('home');
        };
 
        // --- FILTER LOGIC ---
        function filterByDate() {
            const targetDate = document.getElementById('searchDate').value;
            const resultsDiv = document.getElementById('filterResults');
 
            if (!targetDate) return alert("Please select a date");
 
            const filtered = trendData.filter(item => item.date === targetDate);
 
            resultsDiv.innerHTML = filtered.length ? '' : '<p class="text-center py-10 text-gray-400">No posts found for this date.</p>';
 
            filtered.forEach(item => {
                resultsDiv.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border-l-4 border-sky-500 shadow-sm flex justify-between items-center">
                        <div>
                            <span class="platform-tag ${getPlatformClass(item.platform)}">${item.platform}</span>
                            <h4 class="font-bold mt-2">${item.mediaType}: ${item.mediaTime}</h4>
                            <p class="text-sm text-gray-600">${item.text}</p>
                        </div>
                        <div class="text-right text-xs text-gray-400 font-bold">${item.date}</div>
                    </div>
                `;
            });
        }
 
        // --- UI UPDATES ---
        function updateUI() {
            // Update Stats
            document.getElementById('totalPosts').innerText = trendData.length;
 
            // Update Hashtag Analytics
            const trendList = document.getElementById('trendList');
            let hashtagCount = {};
            trendData.forEach(p => {
                const tags = p.text.match(/#\w+/g);
                if (tags) tags.forEach(t => hashtagCount[t] = (hashtagCount[t] || 0) + 1);
            });
 
            const sortedTags = Object.entries(hashtagCount).sort((a, b) => b[1] - a[1]);
            trendList.innerHTML = sortedTags.length ? '' : '<li class="text-gray-400 italic">No hashtags found...</li>';
            sortedTags.forEach(([tag, count]) => {
                trendList.innerHTML += `<li class="flex justify-between bg-sky-50 p-2 rounded">
                    <span class="font-bold text-sky-700">${tag}</span>
                    <span class="bg-white px-2 rounded text-xs flex items-center shadow-sm">${count} posts</span>
                </li>`;
            });
 
            // Update Full Log
            const logBody = document.getElementById('fullLogBody');
            logBody.innerHTML = trendData.map(item => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-4"><span class="platform-tag ${getPlatformClass(item.platform)}">${item.platform}</span></td>
                    <td class="p-4 font-bold text-slate-700">${item.mediaType}</td>
                    <td class="p-4">${item.mediaTime}</td>
                    <td class="p-4 text-xs font-mono text-gray-500">${item.date}</td>
                    <td class="p-4 text-gray-400 truncate max-w-[150px]">${item.text}</td>
                </tr>
            `).join('');
        }
 
        function getPlatformClass(p) {
            if (p === 'Instagram') return 'insta';
            if (p === 'Facebook') return 'fb';
            if (p === 'YouTube') return 'yt';
            if (p === 'Snapchat') return 'snap';
            if (p === 'ShareChat') return 'shree';
            return '';
        }
 
        function clearData() {
            if (confirm("Clear all data?")) {
                trendData = [];
                localStorage.removeItem('socialTrends');
                updateUI();
            }
        }
 
        // Init
        updateUI();
    </script>
</body>
 
</html>
